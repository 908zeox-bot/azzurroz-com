[build]
  publish = "."
  functions = "netlify/functions"

# Redirect non-www to www
[[redirects]]
  from = "https://azzurroz.com/*"
  to = "https://www.azzurroz.com/:splat"
  status = 301
  force = true

# Clean URLs (optional — remove .html from links)
[[redirects]]
  from = "/membership"
  to = "/membership.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

# 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Cache headers
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
